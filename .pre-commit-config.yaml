# Pre-commit hooks. Install via ``pip install pre-commit`` and
# enable for the repo with ``pre-commit install`` (see CONTRIBUTING.md).
#
# Hooks:
#   * pre-commit-hooks: hygiene basics (trailing whitespace, EOF
#     newline, YAML/TOML well-formedness, large-file guard,
#     mixed line endings, accidental merge conflict markers).
#   * ruff-check : pyflakes + pycodestyle + isort + flake8-bugbear + pyupgrade
#                  per the ``[tool.ruff.lint]`` config in pyproject.toml.
#   * ruff-format: ruff-format defaults with double-quote style.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
